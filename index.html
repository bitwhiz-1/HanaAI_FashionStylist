<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hana — AI Fashion Stylist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    .product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
  margin-top: 14px;
}

.product-card {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 12px;
}

.product-card img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  background: #fff;
  border-radius: 10px;
  margin-bottom: 10px;
}

.product-card h4 {
  font-size: 13px;
  line-height: 1.35;
  margin-bottom: 8px;
  color: var(--text);
}

.product-card p {
  font-size: 12px;
  margin-bottom: 5px;
  color: var(--text2);
}

.product-card a {
  display: inline-block;
  margin-top: 8px;
  padding: 7px 11px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 8px;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
}
  :root {
    --bg: #0a0a0c;
    --bg2: #111114;
    --bg3: #18181d;
    --surface: #1e1e25;
    --surface2: #252530;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #9b9690;
    --text3: #5a5752;
    --accent: #c9a96e;
    --accent2: #e8d5b0;
    --accent-glow: rgba(201,169,110,0.15);
    --pink: #d4a0b0;
    --sidebar-w: 260px;
    --chat-max: 720px;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  [data-theme="light"] {
    --bg: #faf8f5;
    --bg2: #f3f0eb;
    --bg3: #ede9e3;
    --surface: #ffffff;
    --surface2: #f7f4ef;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #1a1814;
    --text2: #7a7470;
    --text3: #b0aba6;
    --accent: #9e7b45;
    --accent2: #6b5230;
    --accent-glow: rgba(158,123,69,0.1);
    --pink: #9e6a7a;
    --shadow: 0 8px 40px rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .sidebar-logo {
    padding: 28px 20px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .logo-gem {
    width: 32px; height: 32px;
    position: relative;
    flex-shrink: 0;
  }

  .logo-gem svg { width: 100%; height: 100%; }

  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 1px;
  }

  .new-chat-btn {
    margin: 16px 14px;
    padding: 10px 14px;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .new-chat-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }
  .new-chat-btn svg { width: 14px; height: 14px; }

  .sidebar-section {
    padding: 8px 14px 4px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
    scrollbar-width: none;
  }
  .chat-history::-webkit-scrollbar { display: none; }

  .history-item {
    padding: 10px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .history-item:hover { background: var(--surface); }
  .history-item.active { background: var(--surface); border: 1px solid var(--border2); }

  .history-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .history-meta { flex: 1; min-width: 0; }
  .history-title { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-time { font-size: 10px; color: var(--text3); margin-top: 1px; }

  .sidebar-footer {
    padding: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .theme-toggle {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }

  .theme-btn {
    flex: 1;
    padding: 6px 0;
    border-radius: 999px;
    border: none;
    background: none;
    color: var(--text2);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .theme-btn.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  .theme-btn svg { width: 12px; height: 12px; }

  .profile-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: white;
    flex-shrink: 0;
  }

  .profile-info { flex: 1; min-width: 0; }
  .profile-name { font-size: 12px; color: var(--text); }
  .profile-plan { font-size: 10px; color: var(--accent); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  /* 3D Fashion Scene Canvas */
  #fashion-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .main-content {
    flex: 1;
    overflow-y: auto;
    position: relative;
    z-index: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* ── WELCOME STATE ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 40px 24px;
    text-align: center;
  }

  .welcome-orb {
    width: 120px; height: 120px;
    position: relative;
    margin-bottom: 28px;
  }

  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--accent);
    animation: orbit 8s linear infinite;
  }
  .orb-ring:nth-child(1) { inset: 0; opacity: 0.4; }
  .orb-ring:nth-child(2) { inset: 10px; opacity: 0.3; animation-duration: 6s; animation-direction: reverse; }
  .orb-ring:nth-child(3) { inset: 20px; opacity: 0.5; animation-duration: 4s; }

  .orb-center {
    position: absolute;
    inset: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px var(--accent-glow);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px var(--accent-glow); transform: scale(1); }
    50% { box-shadow: 0 0 50px var(--accent-glow); transform: scale(1.05); }
  }

  .welcome h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1.1;
  }
  .welcome h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .welcome-sub {
    font-size: 14px;
    color: var(--text2);
    margin-top: 10px;
    letter-spacing: 0.03em;
    max-width: 400px;
  }

  .style-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 32px;
    max-width: 560px;
  }

  .style-pill {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .style-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
    transform: translateY(-2px);
  }
  .style-pill .pill-icon { font-size: 14px; }

  /* ── MESSAGES ── */
  .messages {
    max-width: var(--chat-max);
    margin: 0 auto;
    padding: 24px 24px 120px;
  }

  .message {
    display: flex;
    gap: 14px;
    margin-bottom: 24px;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .msg-avatar.hana {
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: white;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .msg-avatar.user-av {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
  }

  .msg-body { flex: 1; max-width: 85%; }

  .msg-name {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .message.user .msg-name { text-align: right; }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }

  .message:not(.user) .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .message.user .msg-bubble {
    background: var(--accent);
    color: #0a0905;
    border-top-right-radius: 4px;
    margin-left: auto;
  }
  [data-theme="light"] .message.user .msg-bubble { color: #fff; }

  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--accent);
    line-height: 1.2;
    margin: 6px 0 8px;
  }
  .msg-bubble h1 { font-size: 24px; }
  .msg-bubble h2 { font-size: 21px; }
  .msg-bubble h3 { font-size: 18px; }
  .msg-bubble p { margin: 0 0 10px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 8px 0 10px 20px; }
  .msg-bubble li { margin: 4px 0; }
  .msg-bubble strong { color: var(--accent2); font-weight: 500; }
  .msg-bubble code { background: var(--bg3); padding: 2px 5px; border-radius: 5px; }

  @media (max-width: 820px) {
    body { display: block; overflow: hidden; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); transition: transform 0.25s ease; box-shadow: var(--shadow); }
    .sidebar.open { transform: translateX(0); }
    .main { height: 100vh; }
    .chat-header { padding-top: 14px; }
    .welcome h1 { font-size: 34px; }
    .messages { padding-left: 14px; padding-right: 14px; }
    .msg-body { max-width: 92%; }
  }

  /* Style card inside bubble */
  .style-card {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .style-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--text2);
    transition: all 0.2s;
    cursor: pointer;
  }
  .style-item:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .style-item .si-emoji { font-size: 22px; display: block; margin-bottom: 4px; }

  /* Typing indicator */
  .typing-bubble {
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── INPUT AREA ── */
  .input-area {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 16px 24px 24px;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
  }

  .input-wrapper {
    max-width: var(--chat-max);
    margin: 0 auto;
  }

  .mood-tags {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .mood-tags::-webkit-scrollbar { display: none; }

  .mood-tag {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text3);
    font-size: 11px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mood-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px 14px;
    gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-box textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 140px;
    min-height: 22px;
    scrollbar-width: none;
  }
  .input-box textarea::placeholder { color: var(--text3); }
  .input-box textarea::-webkit-scrollbar { display: none; }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn svg { width: 15px; height: 15px; }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0a0905;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px var(--accent-glow); }
  .send-btn svg { width: 16px; height: 16px; }

  .mobile-menu { display: none; }
  @media (max-width: 820px) { .mobile-menu { display: flex; } }

  /* ── HEADER ── */
  .chat-header {
    position: relative;
    z-index: 2;
    padding: 18px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .hana-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.5);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .header-actions { display: flex; gap: 8px; }

  /* Floating fashion elements */
  .fashion-float {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    opacity: 0.04;
    animation: floatEl 20s ease-in-out infinite;
  }
  [data-theme="light"] .fashion-float { opacity: 0.06; }

  @keyframes floatEl {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(5deg); }
    66% { transform: translateY(10px) rotate(-3deg); }
  }

  .fashion-float:nth-child(2) { animation-delay: -7s; animation-duration: 17s; }
  .fashion-float:nth-child(3) { animation-delay: -13s; animation-duration: 23s; }

  /* Scrollbar */
  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Divider */
  .date-divider {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin: 8px 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Welcome hidden when messages show */
  .messages-container.has-messages .welcome { display: none; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-gem">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="16,2 28,10 28,22 16,30 4,22 4,10" stroke="#c9a96e" stroke-width="1" fill="none" opacity="0.4"/>
        <polygon points="16,6 24,12 24,20 16,26 8,20 8,12" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.6"/>
        <polygon points="16,6 24,12 16,26 8,12" fill="#c9a96e" opacity="0.7"/>
        <polygon points="16,6 24,12 16,16" fill="#e8d5b0" opacity="0.9"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">HANA</div>
      <div class="logo-sub">AI Style Atelier</div>
    </div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    New Style Session
  </button>
  <div class="sidebar-section">Recent</div>
  <div class="chat-history">
    <div class="history-item active">
      <div class="history-icon">👗</div>
  <div class="sidebar-footer">
    <div class="theme-toggle">
      <button class="theme-btn active" id="btn-dark" onclick="setTheme('dark')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-1.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM8 1a.75.75 0 0 1 .75.75v.5a.75.75 0 1 1-1.5 0v-.5A.75.75 0 0 1 8 1zm0 12a.75.75 0 0 1 .75.75v.5a.75.75 0 1 1-1.5 0v-.5A.75.75 0 0 1 8 13zM1 8a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 1 8zm12 0a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 13 8z"/></svg>
        Dark
      </button>
      <button class="theme-btn" id="btn-light" onclick="setTheme('light')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 0 1 4.243 10.243A6 6 0 0 1 5.757 3.757 5.974 5.974 0 0 1 8 2zm0 1.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9z"/></svg>
        Light
      </button>
    </div>
    <div class="profile-row">
      <div class="avatar">U</div>
      <div class="profile-info">
        <div class="profile-name">Guest Stylist</div>
        <div class="profile-plan">Style Pro</div>
      </div>
      <button class="icon-btn" style="border:none">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</aside>
<main class="main">
  <canvas id="fashion-canvas"></canvas>
  <svg class="fashion-float" style="width:220px;top:8%;right:5%" viewBox="0 0 200 300" fill="none">
    <path d="M100 20 C60 20 40 60 40 100 L40 160 C40 180 50 190 60 195 L60 280 L140 280 L140 195 C150 190 160 180 160 160 L160 100 C160 60 140 20 100 20Z" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
    <line x1="60" y1="195" x2="140" y2="195" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="100" cy="20" r="8" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
  </svg>
  <svg class="fashion-float" style="width:160px;bottom:25%;left:3%;animation-delay:-4s" viewBox="0 0 160 200" fill="none">
    <path d="M80 10 L150 40 L150 160 L80 190 L10 160 L10 40 Z" stroke="#d4a0b0" stroke-width="1" fill="none"/>
    <path d="M80 10 L80 190" stroke="#d4a0b0" stroke-width="0.5"/>
    <path d="M10 40 L150 160" stroke="#d4a0b0" stroke-width="0.5"/>
    <path d="M150 40 L10 160" stroke="#d4a0b0" stroke-width="0.5"/>
  </svg>
  <svg class="fashion-float" style="width:100px;top:30%;right:12%;animation-delay:-10s" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="45" stroke="#c9a96e" stroke-width="1" fill="none"/>
    <circle cx="50" cy="50" r="30" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
    <circle cx="50" cy="50" r="10" stroke="#c9a96e" stroke-width="1" fill="none"/>
    <line x1="5" y1="50" x2="95" y2="50" stroke="#c9a96e" stroke-width="0.5"/>
    <line x1="50" y1="5" x2="50" y2="95" stroke="#c9a96e" stroke-width="0.5"/>
  </svg>
  <header class="chat-header">
    <button class="icon-btn mobile-menu" onclick="toggleMobileSidebar()" title="Menu">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <div class="hana-status">
      <div class="status-dot"></div>
      <span class="status-label">Hana is ready to style you</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="Style profile">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="icon-btn" title="Share lookbook">
        <svg viewBox="0 0 16 16" fill="none"><path d="M11 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4zM5 8a2 2 0 1 1 0 4 2 2 0 0 1 0-4zM11 8a2 2 0 1 1 0 4 2 2 0 0 1 0-4z" stroke="currentColor" stroke-width="1.2"/><path d="M7 9.5L9 7M7 6.5L9 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <div class="main-content" id="main-scroll">
    <div class="messages-container" id="msg-container">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-orb">
          <div class="orb-ring"></div>
          <div class="orb-ring"></div>
          <div class="orb-ring"></div>
          <div class="orb-center">✦</div>
        </div>
        <h1>Hello, I'm <em>Hana</em>.<br>Your personal stylist.</h1>
        <p class="welcome-sub">From capsule wardrobes to runway trends — I curate style that feels like <em>you</em>.</p>
        <div class="style-pills">
          <button class="style-pill" onclick="sendSuggestion('Build me a capsule wardrobe for spring')">
            <span class="pill-icon">🌸</span> Spring capsule
          </button>
          <button class="style-pill" onclick="sendSuggestion('What are the biggest fashion trends right now?')">
            <span class="pill-icon">📰</span> Latest trends
          </button>
          <button class="style-pill" onclick="sendSuggestion('I need an outfit for a black tie event')">
            <span class="pill-icon">🥂</span> Black tie look
          </button>
          <button class="style-pill" onclick="sendSuggestion('Help me build a sustainable wardrobe')">
            <span class="pill-icon">🌿</span> Sustainable style
          </button>
          <button class="style-pill" onclick="sendSuggestion('What colors suit a warm skin tone?')">
            <span class="pill-icon">🎨</span> Color palette
          </button>
          <button class="style-pill" onclick="sendSuggestion('Style tips for petite body types')">
            <span class="pill-icon">✨</span> Body-type styling
          </button>
        </div>
      </div>
      <div class="messages" id="messages-list" style="display:none"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <div class="mood-tags">
        <button class="mood-tag" onclick="addTag('Casual vibes')">✦ Casual vibes</button>
        <button class="mood-tag" onclick="addTag('Office ready')">✦ Office ready</button>
        <button class="mood-tag" onclick="addTag('Evening glamour')">✦ Evening glamour</button>
        <button class="mood-tag" onclick="addTag('Street style')">✦ Street style</button>
        <button class="mood-tag" onclick="addTag('Resort wear')">✦ Resort wear</button>
        <button class="mood-tag" onclick="addTag('Athleisure')">✦ Athleisure</button>
      </div>
      <div class="input-box">
        <textarea id="chat-input" rows="1" placeholder="Ask Hana anything about style…" 
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-actions">
          <button class="icon-btn" title="Attach inspiration">
            <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V10l4-4 2 2 4-5 2 2v7a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><circle cx="5.5" cy="6" r="1.5" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 16 16" fill="none"><path d="M13 8L3 3l2 5-2 5 10-5z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="./script.js"></script>
</body>
</html>
